server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/car_wash?serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&allowMultiQueries=true&autoReconnect=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:Pa88word}
    driver-class-name: com.mysql.cj.jdbc.Driver
    driverClassName: com.mysql.cj.jdbc.Driver
  redis:
    host: ${SPRING_REDIS_HOST:redis}
    port: ${SPRING_REDIS_PORT:6379}
  jackson:
    time-zone: Asia/Shanghai
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

logging:
  file:
    path: /app/logs
  level:
    root: INFO

fool:
  app:
    initialization:
      enabled: true
  agent:
    chat:
      default-provider: ${FOOL_AGENT_DEFAULT_PROVIDER:deepseek}
      providers:
        deepseek:
          display-name: DeepSeek
          base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
          api-key: ${DEEPSEEK_API_KEY:}
          model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
        openai:
          display-name: OpenAI
          base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
          api-key: ${OPENAI_API_KEY:}
          model: ${OPENAI_MODEL:gpt-5-mini}
