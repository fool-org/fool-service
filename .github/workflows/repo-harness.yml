name: Repo Harness

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - ".github/workflows/repo-harness.yml"
      - "agent_chats/**"
      - "docs/**"
      - "scripts/**"
      - "tasks.md"
      - "pom.xml"
      - "frontend/package.json"
  push:
    branches:
      - main
    paths:
      - "AGENTS.md"
      - ".github/workflows/repo-harness.yml"
      - "agent_chats/**"
      - "docs/**"
      - "scripts/**"
      - "tasks.md"
      - "pom.xml"
      - "frontend/package.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repo-harness:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run repo harness validation
        run: |
          python scripts/check_repo_harness.py \
            --report-json artifacts/repo-harness.json \
            --junit-out artifacts/repo-harness.xml
